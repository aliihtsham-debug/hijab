<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a2e" />
  <title>For Hijab ❤️</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💖</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- Three.js Canvas Container -->
  <div id="canvas-container"></div>

  <!-- DOM Overlay for all UI text -->
  <div id="overlay">
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loader-heart">💖</div>
      <p class="loading-text">Loading something special...</p>
    </div>

    <!-- Act Messages -->
    <div id="message-container" class="hidden">
      <p id="act-message" class="act-message"></p>
    </div>

    <!-- Her Name Reveal -->
    <div id="name-reveal" class="hidden">
      <h1 id="her-name" class="her-name"></h1>
      <p id="name-subtitle" class="name-subtitle"></p>
    </div>

    <!-- Proposal Card -->
    <div id="proposal-card" class="hidden">
      <div class="card-inner">
        <div class="card-glow"></div>
        <div class="card-content">
          <p class="proposal-line">My dearest Hijab,</p>
          <p class="proposal-line">Every moment with you feels like a beautiful dream...</p>
          <p class="proposal-line">You are my starlight, my everything.</p>
          <h2 class="proposal-question">Will you be mine? 💍</h2>
          <div class="proposal-buttons">
            <button class="yes-btn" data-intensity="1">Yes 💕</button>
            <button class="yes-btn" data-intensity="2">Absolutely! 💖</button>
            <button class="yes-btn" data-intensity="3">A thousand times yes! 🌹</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Celebration Screen -->
    <div id="celebration" class="hidden">
      <h1 class="celebration-title">She said Yes! 🎉</h1>
      <p class="celebration-message">You just made me the happiest person alive ❤️</p>
      <p class="celebration-sub">Forever starts now, Hijab 🌹</p>
    </div>

    <!-- Skip Button -->
    <button id="skip-btn" class="hidden">Skip →</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
